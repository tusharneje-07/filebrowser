<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Browser</title>
    <link rel="stylesheet" href="tailwind.min.css" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body class="app-body">
    <main class="app-main">
      <section class="panel-shell">
        <header class="topbar">
          <button id="homeBtn" class="nav-btn" type="button" title="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z"/></svg>
          </button>
          <button id="backBtn" class="nav-btn" type="button" title="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
          </button>
          <button id="forwardBtn" class="nav-btn" type="button" title="Forward">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
          </button>

          <div class="crumb-wrap">
            <div id="pathCrumbs" class="crumbs flex items-center gap-1 text-sm"></div>
          </div>

          <div class="topbar-actions">
            <button id="configBtn" class="nav-btn" type="button" title="Config">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.8a3.2 3.2 0 100 6.4 3.2 3.2 0 000-6.4z"/><path d="M19.4 15a1 1 0 00.2 1.1l.1.1a1.1 1.1 0 010 1.6l-1.2 1.2a1.1 1.1 0 01-1.6 0l-.1-.1a1 1 0 00-1.1-.2 1 1 0 00-.6.9V20a1.1 1.1 0 01-1.1 1.1h-1.8A1.1 1.1 0 0110 20v-.2a1 1 0 00-.6-.9 1 1 0 00-1.1.2l-.1.1a1.1 1.1 0 01-1.6 0l-1.2-1.2a1.1 1.1 0 010-1.6l.1-.1a1 1 0 00.2-1.1 1 1 0 00-.9-.6H4A1.1 1.1 0 012.9 13v-2A1.1 1.1 0 014 9.9h.2a1 1 0 00.9-.6 1 1 0 00-.2-1.1l-.1-.1a1.1 1.1 0 010-1.6l1.2-1.2a1.1 1.1 0 011.6 0l.1.1a1 1 0 001.1.2 1 1 0 00.6-.9V4A1.1 1.1 0 0110 2.9h2A1.1 1.1 0 0113.1 4v.2a1 1 0 00.6.9 1 1 0 001.1-.2l.1-.1a1.1 1.1 0 011.6 0l1.2 1.2a1.1 1.1 0 010 1.6l-.1.1a1 1 0 00-.2 1.1 1 1 0 00.9.6h.2A1.1 1.1 0 0121.1 11v2a1.1 1.1 0 01-1.1 1.1h-.2a1 1 0 00-.9.6z"/></svg>
            </button>
            <button id="togglePreviewBtn" class="nav-btn" type="button" title="Toggle Preview">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button id="refreshBtn" class="nav-btn" type="button" title="Refresh">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 10-2.3 5.7M20 4v7h-7"/></svg>
            </button>
          </div>
        </header>

        <div class="search-row">
          <input id="searchInput" type="text" class="search-input" placeholder="Search folders and files (Ctrl+K)" />
        </div>

        <div class="content-wrap">
          <p id="statusLine" class="status-line">Ready</p>

          <section id="explorerWrap" class="explorer-wrap">
            <ul id="fileList" class="file-grid"></ul>
          </section>

          <section id="previewDock" class="preview-dock">
            <div class="preview-head">
              <h2 class="preview-title">Preview</h2>
              <span id="previewType" class="preview-type">None</span>
            </div>
            <p id="previewMeta" class="preview-meta">Select a file to preview.</p>
            <div id="previewBody" class="preview-body"></div>
          </section>
        </div>

        <div id="configPanel" class="config-panel hidden">
          <div class="config-card">
            <div class="config-head">
              <h3 class="config-title">Configuration</h3>
              <button id="closeConfigBtn" class="nav-btn" type="button" title="Close config">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>

            <label class="config-label" for="serverUrl">Server</label>
            <input id="serverUrl" type="url" class="server-input" value="http://127.0.0.1:5000" />

            <label class="config-label" for="rootSelect">Root</label>
            <select id="rootSelect" class="root-select"></select>

            <button id="saveServerBtn" class="save-btn" type="button">Save Config</button>
          </div>
        </div>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
