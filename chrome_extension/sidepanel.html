<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Browser</title>
    <link rel="stylesheet" href="tailwind.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body class="app-body">
    <main class="app-main">
      <section class="panel-shell">
        <header class="topbar">
          <div class="address-row">
            <div class="address-bar">
              <span class="material-symbols-rounded address-icon" aria-hidden="true">folder_open</span>
              <span id="pathText" class="path-text">Home</span>
            </div>
            <button id="themeToggleBtn" class="nav-btn theme-btn" type="button" title="Switch to light theme">
              <span id="themeIcon" class="material-symbols-rounded" aria-hidden="true">dark_mode</span>
            </button>
            <button id="copyPathBtn" class="nav-btn copy-btn" type="button" title="Copy path">
              <span class="material-symbols-rounded" aria-hidden="true">content_copy</span>
            </button>
          </div>

          <div class="toolbar-row">
            <button id="homeBtn" class="tool-btn" type="button" title="Home">
              <span class="material-symbols-rounded" aria-hidden="true">home</span>
              <span class="tool-label">Home</span>
            </button>
            <button id="backBtn" class="tool-btn" type="button" title="Previous">
              <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
              <span class="tool-label">Previous</span>
            </button>
            <button id="forwardBtn" class="tool-btn" type="button" title="Next">
              <span class="material-symbols-rounded" aria-hidden="true">arrow_forward</span>
              <span class="tool-label">Next</span>
            </button>
            <button id="configBtn" class="tool-btn" type="button" title="Setting">
              <span class="material-symbols-rounded" aria-hidden="true">settings</span>
              <span class="tool-label">Setting</span>
            </button>
            <button id="togglePreviewBtn" class="tool-btn" type="button" title="View">
              <span id="previewIcon" class="material-symbols-rounded" aria-hidden="true">visibility</span>
              <span id="previewToggleLabel" class="tool-label">View</span>
            </button>
            <button id="refreshBtn" class="tool-btn" type="button" title="Refresh">
              <span class="material-symbols-rounded" aria-hidden="true">refresh</span>
              <span class="tool-label">Refresh</span>
            </button>
          </div>
        </header>

        <div class="search-row">
          <input id="searchInput" type="text" class="search-input" placeholder="Search folders and files (Ctrl+K)" />
        </div>

        <div class="content-wrap">
          <p id="statusLine" class="status-line">Ready</p>
          <div id="multiSendBar" class="multi-send-bar hidden">
            <span id="multiSendText" class="multi-send-text">2 files selected</span>
            <button id="multiSendBtn" class="multi-send-btn" type="button">Send (2) files to site</button>
          </div>

          <section id="explorerWrap" class="explorer-wrap">
            <ul id="fileList" class="file-grid"></ul>
          </section>

          <section id="previewDock" class="preview-dock">
            <div class="preview-head">
              <h2 class="preview-title">Preview</h2>
              <span id="previewType" class="preview-type">None</span>
            </div>
            <p id="previewMeta" class="preview-meta">Select a file to preview.</p>
            <div id="previewBody" class="preview-body"></div>
          </section>
        </div>

      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
